version: "2"

linters:
  enable:
    - bodyclose
    - errcheck
    - govet
    - gosec
    - ineffassign
    - misspell
    - nilerr
    - revive
    - staticcheck
    - unused

formatters:
  enable:
    - gofmt
    - goimports

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
