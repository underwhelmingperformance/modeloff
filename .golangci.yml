version: "2"

linters:
  enable:
    - bodyclose
    - errcheck
    - govet
    - gosec
    - ineffassign
    - misspell
    - nilerr
    - revive
    - staticcheck
    - unused
  exclusions:
    rules:
      - path: internal/observability/constants\.go
        linters:
          - gosec
        text: "G101:"

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
