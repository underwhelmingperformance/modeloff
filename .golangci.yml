version: "2"

linters:
  enable:
    - asciicheck
    - bodyclose
    - decorder
    - embeddedstructfieldcheck
    - errcheck
    - gocognit
    - govet
    - gosec
    - ineffassign
    - misspell
    - modernize
    - nilerr
    - revive
    - staticcheck
    - unused
  settings:
    misspell:
      # RFC 2812 numerics whose stem looks like a misspelling to
      # the dictionary. `LISTEND` is the RPL_LISTEND name (RFC
      # 2812 §5.2); the linter wants to "correct" it to
      # `LISTENED`.
      ignore-rules:
        - LISTEND
  exclusions:
    rules:
      - path: internal/observability/constants\.go
        linters:
          - gosec
        text: "G101:"

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
